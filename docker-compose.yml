services:

  # -------------------------------------------------------
  # ASP.NET Core app
  # Caddy живе у окремому репо vkostyrko/caddy і роутить
  # через зовнішню Docker-мережу "web" за container_name.
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: valentyna_app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    expose:
      - "8080"
    networks:
      - web
    # Секрети / локальні overrides — НЕ комітяться
    # env_file: .env

networks:
  web:
    external: true
